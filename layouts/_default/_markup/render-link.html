{{ $dest := .Destination }}
{{ $isExternal := strings.HasPrefix $dest "http" }}
{{ $isFile := or (strings.HasSuffix $dest ".pdf") (strings.HasSuffix $dest ".docx") (strings.HasSuffix $dest ".js") }}
<a href="{{ $dest | safeURL }}"{{ with .Title}} title="{{ . }}"{{ end }}{{ if or $isExternal $isFile }} target="_blank" rel="noopener"{{ end }}>{{ .Text | safeHTML }}</a>
