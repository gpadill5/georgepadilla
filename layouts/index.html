{{ define "main" }}
<main class="page-main pa4" role="main">
  <section class="page-content mw8 center home-about">
    <header class="profile-hero">
      {{ with index .Params.images 0 }}
        <img src="{{ . | relURL }}" class="profile-hero-photo" alt="George Padilla smiling outdoors">
      {{ end }}
      <div class="profile-hero-copy">
        <h1>{{ .Title }}</h1>
        {{ with .Params.subtitle }}<p>{{ . }}</p>{{ end }}
        <nav class="profile-hero-links" aria-label="Profile links">
          <a href="mailto:georgepadilla901@gmail.com"><i class="fas fa-envelope"></i><span>email</span></a>
          <a href="/files/George_Padilla_resume.pdf" target="_blank" rel="noopener"><i class="far fa-file"></i><span>cv</span></a>
          <a href="https://github.com/gpadill5" target="_blank" rel="noopener"><i class="fab fa-github"></i><span>github</span></a>
          <a href="https://www.linkedin.com/in/george-padilla-a500b921b/" target="_blank" rel="noopener"><i class="fab fa-linkedin"></i><span>linkedin</span></a>
        </nav>
      </div>
    </header>
    <article class="home-about-copy lh-copy">
      {{ .Content }}
    </article>
  </section>
</main>
{{ end }}
